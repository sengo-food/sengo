<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sengo 森林食品</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
body { background: #F7F8FA; color: #111; padding-bottom: 40px; }

.header {
  background: #2D7D45;
  padding: 18px 16px;
  text-align: center;
}
.brand {
  font-size: 20px;
  font-weight: bold;
  color: white;
}
.slogan {
  font-size: 13px;
  color: rgba(255,255,255,0.85);
  margin-top: 4px;
}

.tabs {
  display: flex;
  gap: 10px;
  padding: 14px 12px;
  background: white;
  overflow-x: auto;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 8px 16px;
  border-radius: 20px;
  background: #F1F3F5;
  font-size: 14px;
  color: #444;
  cursor: pointer;
  white-space: nowrap;
}
.tab.active {
  background: #2D7D45;
  color: white;
}

.goods-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 12px;
}

.card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 3px 12px rgba(0,0,0,0.04);
}
.card-img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  background: #f2f2f2;
}
.card-info {
  padding: 12px;
}
.card-name {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 6px;
}
.card-spec {
  font-size: 13px;
  color: #999;
  margin-bottom: 8px;
}
.price {
  font-size: 20px;
  font-weight: bold;
  color: #D32F2F;
}

.img-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 999;
}
.modal-img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 8px;
}
.close-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  color: white;
  font-size: 24px;
  cursor: pointer;
  background: rgba(255,255,255,0.2);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

// 渲染分类标签
const cateList = [...new Set(goods.map(i => i.cate))];
const tabsEl = document.getElementById('tabs');
tabsEl.innerHTML = cateList.map((cate, idx) =>
  `<div class="tab ${idx === 0 ? 'active' : ''}" data-cate="${cate}">${cate}</div>`
).join('');

// 渲染商品列表
function renderGoods(cateName) {
  const list = goods.filter(i => i.cate === cateName);
  const listEl = document.getElementById('list');
  listEl.innerHTML = list.map(item => `
    <div class="card">
      <img class="card-img" src="${item.img}" alt="${item.name}">
      <div class="card-info">
        <div class="card-name">${item.name}</div>
        <div class="card-spec">${item.spec}</div>
        <div class="price">¥${item.price}</div>
      </div>
    </div>
  `).join('');

  // 绑定图片点击放大
  document.querySelectorAll('.card-img').forEach(img => {
    img.addEventListener('click', () => {
      document.getElementById('modalImg').src = img.src;
      document.getElementById('imgModal').style.display = 'flex';
    });
  });
}

// 切换分类
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderGoods(tab.dataset.cate);
  });
});

// 关闭放大弹窗
document.getElementById('closeBtn').addEventListener('click', () => {
  document.getElementById('imgModal').style.display = 'none';
});
document.getElementById('imgModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('imgModal')) {
    document.getElementById('imgModal').style.display = 'none';
  }
});

// 默认渲染第一个分类
renderGoods(cateList[0]);
</script>

</html>
