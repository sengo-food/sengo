<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{background:#F7F8FA;color:#111;padding-bottom:40px}

/* 顶部品牌栏（品牌绿色） */
.header{background:#2D7D45;padding:18px 16px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.05)}
.brand{font-size:20px;font-weight:800;color:#fff;letter-spacing:1px}
.slogan{font-size:12px;color:#ffffff;margin-top:4px;opacity:0.9}

/* 分类横向滚动 */
.tabs{padding:14px 12px;display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;background:#fff;margin-bottom:12px}
.tabs::-webkit-scrollbar{display:none}
.tab{white-space:nowrap;padding:10px 18px;border-radius:20px;background:#F1F3F5;font-size:14px;font-weight:500;color:#444;cursor:pointer}
.tab.active{background:#2D7D45;color:#fff}

/* 商品网格 */
.goods-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 12px}

/* 高级商品卡片 */
.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,0.04)}
.card-img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#f2f2f2;cursor:pointer;transition:transform 0.2s ease}
.card-img:hover{transform:scale(1.02)}
.card-info{padding:12px}
.card-name{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:6px;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden}
.card-spec{font-size:11px;color:#999;margin-bottom:8px}
.price{font-size:16px;font-weight:800;color:#D32F2F}

/* 标签：仅保留表格隐含的新品/热销（无则空） */
.tag{position:absolute;background:#D32F2F;color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.tag.new{background:#2D7D45}
.tag.hot{background:#D32F2F}

/* 卡片容器相对定位 */
.card{position:relative}

/* 图片放大弹窗 */
.img-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:999;display:none;align-items:center;justify-content:center;padding:20px}
.modal-img{max-width:90%;max-height:90%;object-contain;border-radius:8px}
.close-btn{position:absolute;top:20px;right:20px;color:#fff;font-size:24px;cursor:pointer;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center}
</style>
</head>

// 渲染分类
const cateList = [...new Set(goods.map(item => item.cate))];
const tabsEl = document.getElementById('tabs');
tabsEl.innerHTML = cateList.map((cate, index) => `
  <div class="tab ${index === 0 ? 'active' : ''}" data-cate="${cate}">${cate}</div>
`).join('');

// 渲染商品
function renderGoodsByCate(targetCate) {
  const goodsListEl = document.getElementById('list');
  const targetGoods = goods.filter(item => item.cate === targetCate);

  goodsListEl.innerHTML = targetGoods.map(good => `
    <div class="card">
      ${good.tag ? `<div class="tag ${good.tag}">${
        good.tag === 'new' ? '新品' : good.tag === 'hot' ? '热销' : '折扣'
      }</div>` : ''}
      <img class="card-img" src="${good.img}" data-src="${good.img}" alt="${good.name}" />
      <div class="card-info">
        <div class="card-name">${good.name}</div>
        <div class="card-spec">${good.spec}</div>
        <div class="price">¥${good.price}</div>
      </div>
    </div>
  `).join('');

  // 绑定图片放大事件
  document.querySelectorAll('.card-img').forEach(img => {
    img.addEventListener('click', () => {
      document.getElementById('modalImg').src = img.dataset.src;
      document.getElementById('imgModal').style.display = 'flex';
    });
  });
}

// 分类切换事件
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderGoodsByCate(tab.dataset.cate);
  });
});

// 关闭弹窗
document.getElementById('closeBtn').addEventListener('click', () => {
  document.getElementById('imgModal').style.display = 'none';
});
document.getElementById('imgModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('imgModal')) {
    document.getElementById('imgModal').style.display = 'none';
  }
});

// 初始渲染
renderGoodsByCate(cateList[0]);
</script>
