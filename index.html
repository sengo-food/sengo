<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>sengo森林食品 商品相册</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#f7f7f7;padding:12px}
.title{text-align:center;padding:15px 0;font-size:20px;font-weight:600;color:#2E7D32}
.tabs{display:flex;gap:8px;overflow:auto;padding:10px 0;white-space:nowrap;margin-bottom:10px}
.tab{padding:8px 16px;background:#fff;border-radius:20px;font-size:14px;cursor:pointer;border:1px solid #eee}
.tab.active{background:#2E7D32;color:#fff;border:none}
.list{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.item{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.item img{width:100%;height:150px;object-fit:cover}
.info{padding:12px}
.name{font-weight:bold;font-size:15px;margin-bottom:4px}
.spec{color:#666;font-size:13px;margin-bottom:6px}
.price{color:#E53935;font-weight:bold;font-size:16px}
.empty{text-align:center;padding:60px 20px;color:#999;font-size:14px}
.loading{text-align:center;padding:60px 20px;color:#666}
</style>
</head>

<body>
<div class="title">sengo 森林食品 特产电子相册</div>
<div class="tabs" id="tabs"></div>
<div class="list" id="list"><div class="loading">正在加载商品数据...</div></div>

<script>
// ✅ 固定填你的腾讯文档链接，不用改
const SHEET_URL = "https://docs.qq.com/openapi/doc/export/DZW9zdkFXdEVPQkxD?format=csv&t=csv";

async function loadGoods() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const rows = text.match(/\[(.*?)\]/g) || [];
    const goodsList = [];

    // 跳过表头，从第2行开始读取
    rows.slice(1).forEach(row => {
      try {
        const data = JSON.parse(row.replace(/'/g, '"'));
        const [cate, name, spec, price, img] = data;
        if (name && price) {
          // 自动处理图片链接，兼容页面链接/直链
          let imgUrl = img || "https://picsum.photos/300/150?random=" + Math.random();
          if (imgUrl.includes("imgchr.com/i/")) {
            const imgId = imgUrl.split("/i/")[1];
            imgUrl = `https://s41.ax1x.com/2026/04/08/${imgId}.png`;
          }
          goodsList.push({
            cate: cate || "未分类",
            name,
            spec: spec || "无规格",
            price,
            img: imgUrl
          });
        }
      } catch (e) {
        console.error("行数据解析失败:", e);
      }
    });

    if (goodsList.length === 0) {
      document.getElementById('list').innerHTML = '<div class="empty">请先在腾讯文档中添加商品数据</div>';
      return;
    }

    // 生成分类标签
    const categories = [...new Set(goodsList.map(item => item.cate))];
    const tabsContainer = document.getElementById('tabs');
    tabsContainer.innerHTML = categories.map(cate => 
      `<div class="tab ${cate === categories[0] ? 'active' : ''}" data-cate="${cate}">${cate}</div>`
    ).join('');

    // 默认显示第一个分类
    renderGoods(categories[0], goodsList);

    // 分类切换事件
    tabsContainer.addEventListener('click', (e) => {
      if (e.target.dataset.cate) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        renderGoods(e.target.dataset.cate, goodsList);
      }
    });

  } catch (err) {
    document.getElementById('list').innerHTML = '<div class="empty">数据加载失败，请检查腾讯文档权限</div>';
    console.error("加载失败:", err);
  }
}

// 渲染商品列表
function renderGoods(cate, goodsList) {
  const listContainer = document.getElementById('list');
  const filteredGoods = goodsList.filter(item => item.cate === cate);
  
  listContainer.innerHTML = filteredGoods.length ? filteredGoods.map(item => `
    <div class="item">
      <img src="${item.img}" alt="${item.name}">
      <div class="info">
        <div class="name">${item.name}</div>
        <div class="spec">${item.spec}</div>
        <div class="price">¥${item.price}</div>
      </div>
    </div>
  `).join('') : '<div class="empty">该分类暂无商品</div>';
}

// 页面加载完成后执行
window.onload = loadGoods;
</script>
</body>
</html>
