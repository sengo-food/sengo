<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>sengo森林食品 商品相册</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#f7f7f7;padding:12px}
.title{text-align:center;padding:15px 0;font-size:20px;font-weight:600;color:#2E7D32}
.tabs{display:flex;gap:8px;overflow:auto;padding:10px 0;white-space:nowrap;margin-bottom:10px}
.tab{padding:8px 16px;background:#fff;border-radius:20px;font-size:14px;cursor:pointer;border:1px solid #eee}
.tab.active{background:#2E7D32;color:#fff;border:none}
.list{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.item{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.item img{width:100%;height:150px;object-fit:cover}
.info{padding:12px}
.name{font-weight:bold;font-size:15px;margin-bottom:4px}
.spec{color:#666;font-size:13px;margin-bottom:6px}
.price{color:#E53935;font-weight:bold;font-size:16px}
.empty{text-align:center;padding:60px 20px;color:#999;font-size:14px}
</style>
</head>

<body>
<div class="title">sengo 森林食品 特产电子相册</div>
<div class="tabs" id="tabs"></div>
<div class="list" id="list"></div>

<script>
// ✅ 直接在这里写商品数据，完全不用腾讯文档，100%不报错
const goodsList = [
  {
    cate: "坚果",
    name: "榛子",
    spec: "500g/袋",
    price: "39.9",
    img: "https://s41.ax1x.com/2026/04/08/peUo9s0.png"
  },
  {
    cate: "菌菇",
    name: "黑木耳",
    spec: "250g/袋",
    price: "29.9",
    img: "https://s41.ax1x.com/2026/04/08/peUIvGj.png"
  },
  {
    cate: "饮品",
    name: "蓝莓汁",
    spec: "250g/袋",
    price: "29.9",
    img: "https://s41.ax1x.com/2026/04/08/peUoCLV.png"
  },
  {
    cate: "果酒",
    name: "蓝莓酒",
    spec: "250g/袋",
    price: "29.9",
    img: "https://s41.ax1x.com/2026/04/08/peUoiZT.png"
  },
  {
    cate: "滋补",
    name: "鹿茸",
    spec: "250g/袋",
    price: "29.9",
    img: "https://s41.ax1x.com/2026/04/08/peUoFdU.png"
  }
];

// 渲染商品
function renderGoods() {
  // 生成分类标签
  const categories = [...new Set(goodsList.map(item => item.cate))];
  const tabsContainer = document.getElementById('tabs');
  tabsContainer.innerHTML = categories.map(cate => 
    `<div class="tab ${cate === categories[0] ? 'active' : ''}" data-cate="${cate}">${cate}</div>`
  ).join('');

  // 默认显示第一个分类
  showGoods(categories[0]);

  // 分类切换事件
  tabsContainer.addEventListener('click', (e) => {
    if (e.target.dataset.cate) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      showGoods(e.target.dataset.cate);
    }
  });
}

// 显示对应分类商品
function showGoods(cate) {
  const listContainer = document.getElementById('list');
  const filteredGoods = goodsList.filter(item => item.cate === cate);
  
  listContainer.innerHTML = filteredGoods.length ? filteredGoods.map(item => `
    <div class="item">
      <img src="${item.img}" alt="${item.name}">
      <div class="info">
        <div class="name">${item.name}</div>
        <div class="spec">${item.spec}</div>
        <div class="price">¥${item.price}</div>
      </div>
    </div>
  `).join('') : '<div class="empty">该分类暂无商品</div>';
}

// 页面加载完成后执行
window.onload = renderGoods;
</script>
</body>
</html>
