<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 加速核心 -->
<meta http-equiv="Cache-Control" content="max-age=31536000">
<link rel="preconnect" href="https://sengo-food.github.io">
<title>sengo 森林食品</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif }
body { background:#f7f8fa;color:#111;padding-bottom:40px }
.header { background:#2D7D45;padding:18px 16px;text-align:center }
.brand { font-size:20px;font-weight:700;color:#fff }
.slogan { font-size:13px;color:rgba(255,255,255,.85);margin-top:4px }
.tabs { display:flex;gap:10px;padding:14px 12px;background:#fff;overflow-x:auto }
.tabs::-webkit-scrollbar { display:none }
.tab { padding:8px 16px;border-radius:20px;background:#f1f3f5;font-size:14px;color:#444;cursor:pointer;white-space:nowrap }
.tab.active { background:#2D7D45;color:#fff }
.goods-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px }
.card { background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.04) }
.card-img { width:100%;aspect-ratio:1/1;object-fit:cover;background:#f2f2f2 }
.card-info { padding:12px }
.card-name { font-size:14px;font-weight:700;margin-bottom:6px }
.card-spec { font-size:13px;color:#999;margin-bottom:8px }
.price { font-size:20px;font-weight:700;color:#D32F2F }
.img-modal { position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;padding:20px;z-index:999 }
.modal-img { max-width:90%;max-height:90%;border-radius:8px }
.close-btn { position:absolute;top:20px;right:20px;color:#fff;font-size:24px;cursor:pointer;background:rgba(255,255,255,.2);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center }
</style>
</head>
<body>

<div class="header">
  <div class="brand">sengo 森林食品</div>
  <div class="slogan">北纬47°兴安岭原始森林 · 伊春直供</div>
</div>

<div class="tabs" id="tabs"></div>
<div class="goods-grid" id="list"></div>

<div class="img-modal" id="imgModal">
  <span class="close-btn" id="closeBtn">&times;</span>
  <img class="modal-img" id="modalImg" src="">
</div>

<script>
const goods = [
  { cate: "白桦树汁", name: "瑗之桦白桦树汁", spec: "315ml*6/箱", price: "86", img: "yuanzhi_baihua.png" },
  { cate: "白桦树汁", name: "伊村山野白桦树汁", spec: "320ml*6/箱", price: "58", img: "yicun_shanye_baihua.png" },
  { cate: "白桦树汁", name: "志有初桦白桦树汁", spec: "248ml*6/箱", price: "38", img: "zhiyou_chuhua_baihua.png" },
  { cate: "白桦树汁", name: "九峰山白桦树汁包", spec: "190ml*9/箱", price: "65", img: "jiufengshan_baihua_bag.png" },
  { cate: "白桦树汁", name: "九峰山白桦树汁瓶", spec: "320ml*6/箱", price: "55", img: "jiufengshan_baihua_ping.png" },
  { cate: "白桦树汁", name: "九峰山人参白桦树汁", spec: "320ml*6/箱", price: "68", img: "jiufengshan_renshen_baihua.png" },
  { cate: "白桦树汁", name: "林下盛都白桦树汁", spec: "310ml*6/箱", price: "56", img: "linxiashengdu_baihua.png" },
  { cate: "白桦树汁", name: "即淳白桦树汁", spec: "320ml*6/箱", price: "38", img: "jichun_baihua.png" },
  { cate: "白桦树汁", name: "林都伊村白桦树汁", spec: "330ml*6/箱", price: "56", img: "lindu_yicun_baihua.png" },
  { cate: "白桦树汁", name: "伊北白桦树汁", spec: "330ml*6/箱", price: "56", img: "yibei_baihua.png" },
  { cate: "白桦树汁", name: "志有白桦树汁", spec: "330ml*6/箱", price: "56", img: "zhiyou_baihua.png" },
  { cate: "白桦树汁", name: "唤醒森林白桦树汁", spec: "330ml*6/箱", price: "55", img: "huanxing_senlin_baihua.png" },
  { cate: "白桦树汁", name: "嘉桦白桦树汁", spec: "320ml*6/箱", price: "152", img: "jiahua_baihua.png" },
  { cate: "白桦树汁", name: "志有白桦树汁春", spec: "750ml/盒", price: "25", img: "zhiyou_baihua_spring.png" },
  { cate: "白桦树汁", name: "嘉桦卡特罐白桦树汁", spec: "230ml*6/盒", price: "132", img: "jiahua_kate_baihua.png" },
  { cate: "白桦树汁", name: "伊北白桦树汁浓缩液", spec: "50ml*8支/盒", price: "98", img: "yibei_baihua_nongsuo.png" },
  { cate: "白桦树汁", name: "嘉桦白桦树汁浓缩液", spec: "50ml*8支/盒", price: "168", img: "jiahua_baihua_nongsuo.png" },
  { cate: "白桦树汁", name: "瑗之桦白桦树汁浓缩液", spec: "50ml*8支/盒", price: "158", img: "yuanzhi_baihua_nongsuo.png" },
  { cate: "白桦树汁", name: "白桦依然白桦树汁浓缩液", spec: "50ml*6支/盒", price: "108", img: "baihua_yiran_nongsuo.png" },
  { cate: "白桦树汁", name: "志有白桦树汁浓缩液", spec: "50ml*6支/盒", price: "95", img: "zhiyou_baihua_nongsuo.png" },
  { cate: "白桦树汁", name: "森林盛宴白桦树汁浓缩液", spec: "50ml*8支/盒", price: "79", img: "shengyan_baihua_nongsuo.png" },
  { cate: "白桦树汁", name: "森林盛宴白桦树汁酵素", spec: "50ml*8支/盒", price: "89", img: "shengyan_baihua_jiaoSuv=2.png" },
];

const cateList = [...new Set(goods.map(i=>i.cate))];
const tabsEl = document.getElementById('tabs');
tabsEl.innerHTML = cateList.map((c,i)=>`<div class="tab ${i===0?'active':''}" data-cate="${c}">${c}</div>`).join('');

function render(cate){
  const list=goods.filter(i=>i.cate===cate);
  document.getElementById('list').innerHTML=list.map(item=>`
    <div class="card">
      <img class="card-img" loading="lazy" decoding="async" src="${item.img}" alt="${item.name}">
      <div class="card-info">
        <div class="card-name">${item.name}</div>
        <div class="card-spec">${item.spec}</div>
        <div class="price">¥${item.price}</div>
      </div>
    </div>`).join('');

  document.querySelectorAll('.card-img').forEach(img=>{
    img.onclick=()=>{
      document.getElementById('modalImg').src=img.src;
      document.getElementById('imgModal').style.display='flex';
    }
  });
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    render(tab.dataset.cate);
  }
});

document.getElementById('closeBtn').onclick=()=>document.getElementById('imgModal').style.display='none';
document.getElementById('imgModal').onclick=(e)=>e.target.id==='imgModal'&&(document.getElementById('imgModal').style.display='none');

render(cateList[0]);
</script>
</body>
</html>
